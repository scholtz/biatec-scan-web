server {
    listen       8080;
    server_name  localhost;
    port_in_redirect off;

    access_log /dev/stdout;
    error_log /dev/stderr;

    # Security headers (AUDIT-2026-07-20-01). Read-only explorer with no known XSS sink
    # today, but these are the primary defense-in-depth control against any future one,
    # and they protect the localStorage session id (see authService.ts) from exfiltration.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://algorand-trades.de-4.biatec.io wss://algorand-trades.de-4.biatec.io https://algorand-algod-public.de-4.biatec.io https://mainnet-idx.algonode.cloud https://mainnet-idx.voi.nodely.dev https://algorand.scan.biatec.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ~* \.(manifest|html|xml|json)$ {
        root   /app;
        index  index.html;
        expires 1m;
    }

    location ~* \.(css|js|map|ttf)$ {
        # cache css and js files as they have hash inside filename
        root   /app;
        access_log off;
        expires max;
    }

    location ~* \.(svg|png|xcf|ico)$ {
        # cache css and js files as they have hash inside filename
        root   /app;
        access_log off;
        expires 7d;
    }

    location ~* \.(txt)$ {
        # log robots.txt requests, but cache them
        root   /app;
        expires 30d;
    }

    # Standard SPA configuration
    location / {
        root   /app;
        try_files $uri /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
